# Netlify build configuration
# Phase 1: static HTML in docs/ — no build step needed yet.
# When Astro is scaffolded, change command to "npm run build" and publish to "dist".

[build]
  publish = "docs"

[build.environment]
  NODE_VERSION = "20"

# Deploy previews for pull requests are enabled by default.
# Production deploys: only the main branch.
[context.production]
  publish = "docs"

[context.deploy-preview]
  publish = "docs"

[context.branch-deploy]
  publish = "docs"
